# ── Cardputer (M5Stack Cardputer, ESP32-S3, 8 MB flash) ───────────────────
[env:cardputer]
platform    = espressif32@^6.5.0
board       = m5stack-stamps3
framework   = arduino

lib_deps =
    https://github.com/m5stack/M5Cardputer.git
    bblanchon/ArduinoJson@^7.1.0
    https://github.com/Arduino-IRremote/Arduino-IRremote.git#v4.4.3
    ewpa/LibSSH-ESP32
    https://github.com/schreibfaul1/ESP32-audioI2S.git#80c80489cd466b427a7aa411cc9b9499dc4d2dc0
    https://github.com/deltabeard/Peanut-GB.git
    mikalhart/TinyGPSPlus@^1.0.3
    jgromes/RadioLib@^7.1.2
    adafruit/Adafruit PN532@^1.3.4
    h2zero/NimBLE-Arduino@^1.4.2
    LSatan/SmartRC-CC1101-Driver-Lib@^2.5.7
    https://github.com/nRF24/RF24.git
    https://github.com/bmorcelli/rc-switch

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
monitor_speed  = 115200
upload_speed   = 1500000

build_flags =
    -DBOARD_CARDPUTER
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -std=gnu++17
    -DARDUINO_LOOP_STACK_SIZE=32768

build_unflags = -std=gnu++11

# Exclude T-Embed-only files from Cardputer build
build_src_filter = +<*> -<input_tembed.cpp> -<tembed_hal.cpp> -<vkb_tembed.cpp>


# ── T-Embed CC1101 (LILYGO T-Embed CC1101, ESP32-S3R8, 8 MB flash) ────────
[env:tembed]
platform    = espressif32@^6.5.0
board       = esp32-s3-devkitc-1
framework   = arduino

lib_deps =
    lovyan03/LovyanGFX@^1.1.12
    bblanchon/ArduinoJson@^7.1.0
    https://github.com/schreibfaul1/ESP32-audioI2S.git#80c80489cd466b427a7aa411cc9b9499dc4d2dc0
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit PN532@^1.3.4
    h2zero/NimBLE-Arduino@^1.4.2
    LSatan/SmartRC-CC1101-Driver-Lib@^2.5.7
    https://github.com/bmorcelli/rc-switch
    https://github.com/Arduino-IRremote/Arduino-IRremote.git#v4.4.3
    https://github.com/nRF24/RF24.git

board_build.flash_size  = 8MB
board_build.filesystem  = littlefs
board_build.partitions  = partitions.csv
monitor_speed  = 115200
upload_speed   = 1500000

build_flags =
    -DBOARD_TEMBED
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -std=gnu++17
    -DARDUINO_LOOP_STACK_SIZE=32768

build_unflags = -std=gnu++11

# Exclude Cardputer-only files and libs not present on T-Embed
build_src_filter =
    +<*>
    -<app_ssh.cpp>
    -<ssh_session.cpp>
    -<terminal.cpp>
    -<app_games.cpp>
    -<app_usb_tester.cpp>
    -<app_lora.cpp>
    -<app_voice_memos.cpp>
    -<app_calc.cpp>
    -<app_notes.cpp>
    -<app_hid_keyboard.cpp>
    -<app_usb_storage.cpp>
    -<app_payloads.cpp>
